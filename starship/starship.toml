# Starship Prompt — Catppuccin Mocha Theme

palette = "catppuccin_mocha"

format = """
[](surface0)\
$os\
$username\
[](bg:blue fg:surface0)\
$directory\
[](fg:blue bg:green)\
$git_branch\
$git_status\
[](fg:green bg:teal)\
$nodejs\
$rust\
$python\
$golang\
[](fg:teal bg:surface0)\
$time\
[ ](fg:surface0)\
$line_break\
$character"""

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Macos = "ᙇ "

[username]
show_always = false
style_user = "bg:surface0 fg:text"
format = '[ $user ]($style)'

[directory]
style = "bg:blue fg:crust bold"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Projects" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:green fg:crust"
format = '[$all_status$ahead_behind ]($style)'

[nodejs]
symbol = ""
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "🦀"
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = ""
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:surface0 fg:subtext0"
format = '[  $time ]($style)'

[line_break]
disabled = false

[character]
success_symbol = '[❯](green)'
error_symbol = '[❯](red)'

